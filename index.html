<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PolicyDrift Lab</title><style>body{font-family:system-ui;max-width:980px;margin:20px auto;padding:0 14px;background:#0b1020;color:#e8eeff}textarea{width:100%;min-height:170px;background:#111a35;color:#e8eeff;border:1px solid #2a3b70;border-radius:8px;padding:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}button{margin-top:10px;background:#5a86ff;color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:700}.card{margin-top:12px;padding:12px;border:1px solid #2a3b70;border-radius:10px;background:#101834}.bad{color:#ff6b6b}.warn{color:#ffd166}.ok{color:#4ade80}</style></head><body><h1>PolicyDrift Lab</h1><p>Detect dangerous policy drift before agents run.</p><div class='grid'><div><h3>Old Policy</h3><textarea id='old'></textarea></div><div><h3>New Policy</h3><textarea id='new'></textarea></div></div><button onclick='run()'>Analyze Drift</button><div class='card'><h3>Verdict: <span id='v'>-</span></h3><ul id='r'></ul></div><script>const checks=[['human oversight',['without human approval','no human oversight','fully autonomous execution'],3],['lethal autonomy',['kill target','lethal strike','weaponized'],3],['surveillance',['mass surveillance','bulk monitoring'],2],['guardrail removal',['prohibited','not allowed','requires human oversight'],2]];function has(t,a){t=t.toLowerCase();return a.some(x=>t.includes(x));}function run(){const o=document.getElementById('old').value.toLowerCase(),n=document.getElementById('new').value.toLowerCase();let s=0;const out=[];for(const [k,arr,w] of checks){const ob=has(o,arr),nb=has(n,arr);if(!ob&&nb){s+=w;out.push('New risk introduced: '+k);}if(ob&&!nb)out.push('Risk reduced: '+k);}const v=document.getElementById('v');const ul=document.getElementById('r');ul.innerHTML='';let t='LOW',c='ok';if(s>=5){t='HIGH';c='bad';}else if(s>=2){t='MEDIUM';c='warn';}v.textContent=t;v.className=c;(out.length?out:['No major drift found']).forEach(x=>{const li=document.createElement('li');li.textContent=x;ul.appendChild(li);});}</script></body></html>
